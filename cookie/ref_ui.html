<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW: Empire Strike Click</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-grey text-black font-sans h-screen overflow-hidden">

    <div class="grid grid-cols-1 md:grid-cols-3 h-full">

        <div class="flex flex-col items-center justify-center p-8 border-r-2 border-gray-300">
            
            <div class="text-center mb-12">
                <p class="text-sm text-gray-500 uppercase">Progress</p>
                <h1 class="text-5xl font-bold mb-2">
                    <span id="score-display">0</span> %
                </h1>
                <p class="text-sm text-gray-600">Rate: <span id="cps-display">0</span> / sec</p>
            </div>

            <div class="relative w-80 h-80 flex items-center justify-center border-2 border-dashed border-gray-300 rounded-lg p-4">
                
                <span class="absolute top-2 left-2 text-xs text-gray-400">#orbit-container</span>
                <div id="orbit-container" class="absolute inset-0 pointer-events-none"></div>

                <button 
                    id="planet-btn"
                    class="w-48 h-48 bg-gray-100 border-2 border-gray-400 rounded-full hover:bg-gray-200 active:bg-gray-300 flex items-center justify-center cursor-pointer z-10">
                    <span class="font-bold text-gray-500">TARGET<br>(CLICK HERE)</span>
                </button>
            </div>
        </div>

        <div class="p-6 border-r-2 border-gray-300 bg-gray-50 overflow-y-auto">
            <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-300 pb-2">Command Center</h2>
            
            <div class="space-y-4">
                <div class="border-2 border-gray-300 p-4 bg-white">
                    <p class="text-xs text-gray-500 uppercase">Click Power</p>
                    <p class="text-xl font-bold"><span id="power-display">1</span> % / Click</p>
                </div>
            </div>
        </div>

        <div class="p-6 overflow-y-auto bg-gray-100">
            <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-300 pb-2">Deploy Forces</h2>

            <div class="space-y-3" id="store-container">
                
                <button id="buy-stormtrooper-btn" class="w-full flex items-center justify-between p-4 bg-white border-2 border-gray-300 hover:border-gray-500 hover:bg-gray-50 text-left">
                    <div>
                        <h3 class="font-bold">1. Stormtrooper</h3>
                        <p class="text-xs text-gray-600">+1 Click Power</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold">Cost: <span id="stormtrooper-cost">15</span></p>
                        <p class="text-xs text-gray-500">Owned: <span id="stormtrooper-owned">0</span></p>
                    </div>
                </button>

                <button id="buy-tie-btn" class="w-full flex items-center justify-between p-4 bg-white border-2 border-gray-300 hover:border-gray-500 hover:bg-gray-50 text-left">
                    <div>
                        <h3 class="font-bold">2. TIE Fighter</h3>
                        <p class="text-xs text-gray-600">+1 Auto / sec</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold">Cost: <span id="tie-cost">100</span></p>
                        <p class="text-xs text-gray-500">Owned: <span id="tie-owned">0</span></p>
                    </div>
                </button>

                <button id="buy-atat-btn" class="w-full flex items-center justify-between p-4 bg-white border-2 border-gray-300 hover:border-gray-500 hover:bg-gray-50 text-left">
                    <div>
                        <h3 class="font-bold">3. AT-AT Walker</h3>
                        <p class="text-xs text-gray-600">+5 Auto / sec</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold">Cost: <span id="atat-cost">500</span></p>
                        <p class="text-xs text-gray-500">Owned: <span id="atat-owned">0</span></p>
                    </div>
                </button>

            </div>
        </div>

    </div>

</body>
</html>
